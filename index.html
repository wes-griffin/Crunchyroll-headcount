<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crunchyroll Headcount</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="nav.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --orange:#FF5E00; --black:#000; --white:#fff;
  --gray:#F5F5F5; --gray-mid:#E0E0E0; --gray-dark:#666; --text:#1A1A1A;
}
body{font-family:Helvetica,Arial,sans-serif;background:#F2EDE6;color:var(--text);min-height:100vh}

/* Header */
.cr-header{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;height:64px;background:#000;color:#fff;padding:0 40px
}
.cr-header-left,.cr-header-right{display:flex;align-items:center;gap:10px;min-width:0}
.cr-header-title{font-weight:700}
.cr-header-title span{color:var(--orange)}
.cr-user-name{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#aaa;font-size:13px}
.cr-avatar-btn{min-width:44px;min-height:44px;border:none;background:#222;color:#fff;border-radius:8px;cursor:pointer}
.cr-avatar-menu{
  position:absolute;right:12px;top:56px;background:#fff;color:#000;border:1px solid var(--gray-mid);
  border-radius:10px;min-width:160px;display:none;box-shadow:0 8px 24px rgba(0,0,0,.2)
}
.cr-avatar-menu.open{display:block}
.cr-avatar-menu button{width:100%;padding:10px 12px;border:none;background:none;text-align:left;cursor:pointer}

/* Top nav */
.cr-nav-bar{
  display:flex;background:#000;border-top:1px solid #222;padding:0 40px;
  overflow-x:auto;-webkit-overflow-scrolling:touch
}
.cr-nav-link{
  padding:14px 18px;color:#888;text-decoration:none;font-size:12px;font-weight:600;
  white-space:nowrap;flex:0 0 auto;max-width:180px;overflow:hidden;text-overflow:ellipsis;border-bottom:3px solid transparent
}
.cr-nav-link.active{color:var(--orange);border-bottom-color:var(--orange)}
.cr-nav-link:hover{color:#fff}

/* Content */
.hero{max-width:900px;margin:0 auto;padding:64px 40px 48px;text-align:center}
.hero h1{font-size:36px;font-weight:900;margin-bottom:12px}
.hero h1 span{color:var(--orange)}
.hero p{color:var(--gray-dark);max-width:520px;margin:0 auto 28px}

.signin-card{
  background:#fff;border-radius:16px;padding:40px;border:1px solid var(--gray-mid);
  max-width:420px;margin:0 auto 36px;box-shadow:0 4px 24px rgba(0,0,0,.08)
}
#googleBtn{display:flex;justify-content:center}

.apps{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:900px;margin:0 auto;padding:0 40px 64px}
.app-card{
  background:#fff;border-radius:16px;padding:28px;border:1px solid var(--gray-mid);
  text-decoration:none;color:var(--text);position:relative;overflow:hidden
}
.app-card p{padding-right:36px}
.app-arrow{position:absolute;right:24px;bottom:24px;color:#ccc}

@media(max-width:600px){
  .cr-header{padding:0 12px;height:56px}
  .cr-header-title{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px}
  .cr-user-name{display:none}
  .cr-nav-bar{display:none}
  .hero{padding:32px 16px}
  .apps{grid-template-columns:1fr;padding:0 16px 80px}
}
</style>
</head>
<body>

<script>
document.addEventListener('DOMContentLoaded', ()=>{
  crInjectNav('index');
});
</script>

<div class="hero">
  <h1>Crunchyroll <span>Headcount</span></h1>
  <p>Access reporting and request workflows.</p>
</div>

<div class="signin-card">
  <h2>Sign in</h2>
  <div id="googleBtn"></div>
</div>

<div class="apps">
  <a class="app-card" href="dashboard.html">
    <h3>Global Headcount Report</h3>
    <p>Executive dashboard and analytics.</p>
    <div class="app-arrow">→</div>
  </a>
  <a class="app-card" href="requests.html">
    <h3>Headcount Requests</h3>
    <p>Submit and manage requests.</p>
    <div class="app-arrow">→</div>
  </a>
</div>

<script>
window.onload = function(){
  google.accounts.id.initialize({
    client_id: "YOUR_GOOGLE_CLIENT_ID",
    callback: function(res){
      const user = { name: "User Name" };
      sessionStorage.setItem('cr_user', JSON.stringify(user));
      sessionStorage.setItem('cr_token_exp', Date.now() + 3600_000);
      location.href = 'dashboard.html';
    }
  });

  google.accounts.id.renderButton(
    document.getElementById("googleBtn"),
    {
      theme:"outline",
      size:"large",
      width: Math.min(280, window.innerWidth - 48)
    }
  );
};
</script>

</body>
</html>
