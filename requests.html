<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Headcount Requests</title>
<script src="nav.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Helvetica,Arial,sans-serif;background:#F2EDE6;color:#1A1A1A}

.content{max-width:1100px;margin:0 auto;padding:24px 40px 120px}

/* Buttons */
.btn{min-height:44px;padding:10px 18px;border-radius:8px;border:none;font-weight:700;cursor:pointer}
.btn-primary{background:#FF5E00;color:#fff}

/* Toast */
.toast{position:fixed;right:24px;bottom:24px;background:#000;color:#fff;padding:12px 16px;border-radius:10px;opacity:0;transition:.25s}
.toast.show{opacity:1}
@media(max-width:600px){
  .toast{bottom:80px;left:12px;right:12px}
}

/* Bottom nav */
.cr-btm-nav{position:fixed;left:0;right:0;bottom:0;height:56px;background:#000;display:flex}
.cr-btm-btn{flex:1;color:#aaa;background:none;border:none}
.cr-btm-btn.active{color:#FF5E00}
</style>
</head>
<body>

<script>
document.addEventListener('DOMContentLoaded', ()=>{
  const user = crGetUser();
  if (!user) location.href='index.html';

  crInjectNav('requests');
  crUpdateHeaderUser(user);

  crHandleBottomNav('reqsBtmNav', ()=>{
    const nav=document.createElement('nav');
    nav.className='cr-btm-nav';
    nav.id='reqsBtmNav';

    ['New','My','Approvals','Admin','More'].forEach((label,i)=>{
      const b=document.createElement('button');
      b.className='cr-btm-btn'+(i===0?' active':'');
      b.innerText=label;
      nav.appendChild(b);
    });

    document.body.appendChild(nav);
  });
});
</script>

<div class="content">
  <button class="btn btn-primary" onclick="alert('Submitted')">Submit</button>
</div>

<div class="toast" id="toast"></div>

</body>
</html>
