<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<script src="nav.js"></script>

<style>
body{font-family:Helvetica,Arial,sans-serif;background:#F2EDE6}
.content{padding:24px 40px}

/* Toast */
.toast{position:fixed;right:24px;bottom:24px;background:#000;color:#fff;padding:12px;border-radius:10px}
@media(max-width:600px){
  .toast{bottom:80px}
}

/* Bottom nav */
.cr-btm-nav{position:fixed;left:0;right:0;bottom:0;height:56px;background:#000;display:flex}
.cr-btm-btn{flex:1;color:#aaa;background:none;border:none}
.cr-btm-btn.active{color:#FF5E00}
</style>
</head>
<body>

<script>
document.addEventListener('DOMContentLoaded', ()=>{
  const user = crGetUser();
  if (!user) location.href='index.html';

  crInjectNav('dashboard');
  crUpdateHeaderUser(user);

  crHandleBottomNav('dashBtmNav', ()=>{
    const nav=document.createElement('nav');
    nav.className='cr-btm-nav';
    nav.id='dashBtmNav';

    ['Overview','Reqs','Attrition','Mapping'].forEach((label,i)=>{
      const b=document.createElement('button');
      b.className='cr-btm-btn'+(i===0?' active':'');
      b.innerText=label;
      nav.appendChild(b);
    });

    document.body.appendChild(nav);
  });
});
</script>

<div class="content">Dashboard</div>
<div class="toast">Toast</div>

</body>
</html>
